apiVersion: v1
kind: ConfigMap
metadata:
  name: ircs-edge-nginx-routes
  namespace: ircs-system
data:
  default.conf: |
    server {
      listen 80;
      server_name localhost;

      location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
      }

      location /api/v1/auth/ { proxy_pass http://ircs-identity-service-svc:8080/api/v1/auth/; }
      location /api/v1/members/ { proxy_pass http://ircs-identity-service-svc:8080/api/v1/members/; }
      location /api/portal/auth/ { proxy_pass http://ircs-identity-service-svc:8080/api/portal/auth/; }
      location /api/portal/profile/ { proxy_pass http://ircs-identity-service-svc:8080/api/portal/profile/; }

      location /api/v1/raw-videos/ { proxy_pass http://ircs-content-service-svc:8080/api/v1/raw-videos/; }
      location /api/v1/unified-videos/ { proxy_pass http://ircs-content-service-svc:8080/api/v1/unified-videos/; }
      location /api/v1/playlists/ { proxy_pass http://ircs-content-service-svc:8080/api/v1/playlists/; }

      location /api/v1/collection-tasks/ { proxy_pass http://ircs-task-service-svc:8080/api/v1/collection-tasks/; }
      location /api/v1/scraper/manual/ { proxy_pass http://ircs-scraper-service-svc:8080/api/v1/scraper/manual/; }
      location /api/v1/magnets/ { proxy_pass http://ircs-magnet-service-svc:8080/api/v1/magnets/; }
      location /api/v1/magnet-providers/ { proxy_pass http://ircs-magnet-service-svc:8080/api/v1/magnet-providers/; }
      location /api/v1/cover-images/ { proxy_pass http://ircs-storage-service-svc:8080/api/v1/cover-images/; }
      location /media/ { proxy_pass http://ircs-storage-service-svc:8080/media/; }
      location /api/v1/messages/ { proxy_pass http://ircs-interaction-service-svc:8080/api/v1/messages/; }
      location /api/v1/configs/ { proxy_pass http://ircs-config-service-svc:8080/api/v1/configs/; }
      location /api/v1/common/ { proxy_pass http://ircs-config-service-svc:8080/api/v1/common/; }
      location /api/v1/credentials/ { proxy_pass http://ircs-credential-service-svc:8080/api/v1/credentials/; }
      location /api/v1/ops/ { proxy_pass http://ircs-ops-service-svc:8080/api/v1/ops/; }
      location /api/v1/dashboard/ { proxy_pass http://ircs-ops-service-svc:8080/api/v1/dashboard/; }
      location /api/v1/debug/ { proxy_pass http://ircs-ops-service-svc:8080/api/v1/debug/; }

      location /api/portal/search/ { proxy_pass http://ircs-search-service-svc:8080/api/portal/search/; }
      location /api/portal/interaction/ { proxy_pass http://ircs-interaction-service-svc:8080/api/portal/interaction/; }
      location /api/portal/feedback/ { proxy_pass http://ircs-interaction-service-svc:8080/api/portal/feedback/; }
      location /api/portal/ { proxy_pass http://ircs-portal-service-svc:8080/api/portal/; }
    }

