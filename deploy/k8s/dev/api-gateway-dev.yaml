apiVersion: apps/v1
kind: Deployment
metadata:
  name: ircs-api-gateway
  namespace: ircs-dev
  labels:
    app: ircs-api-gateway
    app.kubernetes.io/part-of: ircs
    environment: dev
  annotations:
    ircs.prodigalgal.com/no-public-route: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ircs-api-gateway
  template:
    metadata:
      labels:
        app: ircs-api-gateway
        app.kubernetes.io/part-of: ircs
        environment: dev
      annotations:
        ircs.prodigalgal.com/no-public-route: "true"
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: app
          image: harbor.mnnu.eu.org/ircs/ircs-api-gateway:dev
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: ircs-dev-app-config
          env:
            - name: SPRING_APPLICATION_NAME
              value: ircs-api-gateway
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: ircs-dev-app-config
                  key: DB_URL
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ircs-dev-secrets
                  key: DB_PASSWORD
            - name: APP_GATEWAY_AUDIT_ENABLED
              value: "true"
            - name: APP_GATEWAY_SERVICE_ID
              value: api-gateway
            - name: APP_GATEWAY_OPS_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ircs-dev-secrets
                  key: INTERNAL_CREDENTIAL_TOKEN
            - name: APP_GATEWAY_OPS_SERVICE_SCOPES
              value: ops:read ops:run
            - name: IRCS_OUTBOUND_CIRCUIT_API_GATEWAY_PROXY_ENABLED
              value: "true"
            - name: IRCS_OUTBOUND_CIRCUIT_API_GATEWAY_PROXY_FAILURE_THRESHOLD
              value: "5"
            - name: IRCS_OUTBOUND_CIRCUIT_API_GATEWAY_PROXY_OPEN_DURATION_MS
              value: "30000"
            - name: IRCS_OUTBOUND_CIRCUIT_API_GATEWAY_PROXY_HALF_OPEN_MAX_CALLS
              value: "1"
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 30
          resources:
            requests:
              cpu: 20m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 384Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ircs-api-gateway
  namespace: ircs-dev
  labels:
    app: ircs-api-gateway
    app.kubernetes.io/part-of: ircs
    environment: dev
spec:
  type: ClusterIP
  selector:
    app: ircs-api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
