apiVersion: apps/v1
kind: Deployment
metadata:
  name: ircs-search-service
  namespace: ircs-dev
  labels:
    app: ircs-search-service
    app.kubernetes.io/part-of: ircs
    environment: dev
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ircs-search-service
  template:
    metadata:
      labels:
        app: ircs-search-service
        app.kubernetes.io/part-of: ircs
        environment: dev
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: app
          image: harbor.mnnu.eu.org/ircs/ircs-search-service:dev
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: ircs-dev-app-config
          env:
            - name: SPRING_APPLICATION_NAME
              value: ircs-search-service
            - name: SPRING_RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: ircs-dev-app-config
                  key: RABBITMQ_HOST
            - name: SPRING_RABBITMQ_USERNAME
              value: admin
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ircs-dev-secrets
                  key: RABBITMQ_PASSWORD
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: ircs-dev-app-config
                  key: DB_URL
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ircs-dev-secrets
                  key: DB_PASSWORD
            - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              value: "2"
            - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
              value: "0"
            - name: SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT
              value: "30000"
            - name: SPRING_ELASTICSEARCH_URIS
              valueFrom:
                configMapKeyRef:
                  name: ircs-dev-app-config
                  key: ELASTICSEARCH_URIS
            - name: SPRING_ELASTICSEARCH_USERNAME
              value: elastic
            - name: SPRING_ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ircs-dev-secrets
                  key: ELASTICSEARCH_PASSWORD
            - name: APP_STORAGE_R2_PUBLIC_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: ircs-dev-app-config
                  key: R2_PUBLIC_DOMAIN
            - name: APP_SEARCH_CONFIG_LISTENER_ENABLED
              value: "true"
            - name: APP_SEARCH_CACHE_ENABLED
              value: "true"
            - name: APP_SEARCH_CACHE_PORTAL_SUGGEST_TTL
              value: PT60S
            - name: APP_SEARCH_CACHE_PORTAL_RECOMMEND_TTL
              value: PT60S
            - name: APP_SEARCH_WORK_QUEUE_WORKER_ENABLED
              value: "true"
            - name: APP_SEARCH_WORK_QUEUE_BATCH_SIZE
              value: "50"
            - name: APP_SEARCH_WORK_QUEUE_INITIAL_DELAY_MS
              value: "10000"
            - name: APP_SEARCH_WORK_QUEUE_FIXED_RATE_MS
              value: "2000"
            - name: APP_SEARCH_WORK_QUEUE_WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ircs-search-service
  namespace: ircs-dev
  labels:
    app: ircs-search-service
    app.kubernetes.io/part-of: ircs
    environment: dev
spec:
  type: ClusterIP
  selector:
    app: ircs-search-service
  ports:
    - name: http
      port: 8080
      targetPort: http
