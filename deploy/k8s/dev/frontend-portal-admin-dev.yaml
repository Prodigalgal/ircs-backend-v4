apiVersion: v1
kind: ConfigMap
metadata:
  name: ircs-frontend-gateway-nginx
  namespace: ircs-dev
  labels:
    app.kubernetes.io/part-of: ircs
    environment: dev
data:
  default.conf: |
    upstream portal_frontend {
        server ircs-portal-frontend.ircs-dev.svc.cluster.local:3000;
    }

    upstream admin_frontend {
        server ircs-admin-frontend.ircs-dev.svc.cluster.local:80;
    }

    upstream api_gateway {
        server ircs-api-gateway.ircs-dev.svc.cluster.local:8080;
    }

    upstream storage_service {
        server ircs-storage-service.ircs-dev.svc.cluster.local:8080;
    }

    server {
        listen 80;
        server_name _;
        client_max_body_size 50m;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        location = /gateway-health {
            access_log off;
            return 204;
        }


        location ^~ /api/portal {
            proxy_pass http://api_gateway;
        }

        location ^~ /media {
            proxy_pass http://storage_service;
        }

        location / {
            proxy_pass http://portal_frontend;
        }
    }

    server {
        listen 8080;
        server_name _;
        client_max_body_size 50m;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        location = /gateway-health {
            access_log off;
            return 204;
        }

        location ^~ /api/v1 {
            proxy_pass http://api_gateway;
        }

        location ^~ /api/v1/auth {
            proxy_pass http://api_gateway;
        }

        location ^~ /api/v1/members {
            proxy_pass http://api_gateway;
        }

        location ^~ /api/v1/dashboard {
            proxy_pass http://api_gateway;
        }

        location ^~ /api/v1/ops {
            proxy_pass http://api_gateway;
        }

        location ^~ /api/v1/raw-videos {
            proxy_pass http://api_gateway;
        }

        location ^~ /api/v1/unified-videos {
            proxy_pass http://api_gateway;
        }

        location ^~ /api/v1/playlists {
            proxy_pass http://api_gateway;
        }

        location ^~ /api/v1/cover-images {
            proxy_pass http://api_gateway;
        }

        location ^~ /api/v1/collection-tasks {
            proxy_pass http://api_gateway;
        }

        location ^~ /api/v1/catalog {
            proxy_pass http://api_gateway;
        }

        location ^~ /api/v1/standard- {
            proxy_pass http://api_gateway;
        }

        location ^~ /api/v1/raw- {
            proxy_pass http://api_gateway;
        }

        location ^~ /api/v1/data-sources {
            proxy_pass http://api_gateway;
        }

        location ^~ /api/v1/configs {
            proxy_pass http://api_gateway;
        }

        location ^~ /api/v1/common {
            proxy_pass http://api_gateway;
        }

        location ^~ /api/v1/credentials {
            proxy_pass http://api_gateway;
        }

        location ^~ /api/v1/magnet-providers {
            proxy_pass http://api_gateway;
        }

        location ^~ /api/v1/magnets {
            proxy_pass http://api_gateway;
        }

        location ^~ /api/v1/scraper/manual {
            proxy_pass http://api_gateway;
        }

        location ^~ /api/v1/messages {
            proxy_pass http://api_gateway;
        }

        location ^~ /media {
            proxy_pass http://storage_service;
        }

        location / {
            proxy_pass http://admin_frontend;
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: ircs-portal-frontend
  namespace: ircs-dev
  labels:
    app: ircs-portal-frontend
    app.kubernetes.io/part-of: ircs
    environment: dev
spec:
  type: ClusterIP
  selector:
    app: ircs-portal-frontend
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: ircs-admin-frontend
  namespace: ircs-dev
  labels:
    app: ircs-admin-frontend
    app.kubernetes.io/part-of: ircs
    environment: dev
spec:
  type: ClusterIP
  selector:
    app: ircs-admin-frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: ircs-frontend-gateway
  namespace: ircs-dev
  labels:
    app: ircs-frontend-gateway
    app.kubernetes.io/part-of: ircs
    environment: dev
spec:
  type: ClusterIP
  selector:
    app: ircs-frontend-gateway
  ports:
    - name: portal
      protocol: TCP
      port: 80
      targetPort: portal
    - name: admin
      protocol: TCP
      port: 8080
      targetPort: admin
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ircs-portal-frontend
  namespace: ircs-dev
  labels:
    app: ircs-portal-frontend
    app.kubernetes.io/part-of: ircs
    environment: dev
  annotations:
    ircs.prodigalgal.com/no-public-route: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ircs-portal-frontend
  template:
    metadata:
      labels:
        app: ircs-portal-frontend
        app.kubernetes.io/part-of: ircs
        environment: dev
      annotations:
        ircs.prodigalgal.com/no-public-route: "true"
        ircs.prodigalgal.com/config-version: "api-gateway-20260702-1"
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: huawai
          image: harbor.mnnu.eu.org/ircs/huawai:8904e3825088e27b80cafb506cee77e7828c0c65
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: BACKEND_URL
              value: http://ircs-frontend-gateway.ircs-dev.svc.cluster.local:80
          resources:
            requests:
              cpu: 25m
              memory: 192Mi
            limits:
              cpu: 250m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ircs-admin-frontend
  namespace: ircs-dev
  labels:
    app: ircs-admin-frontend
    app.kubernetes.io/part-of: ircs
    environment: dev
  annotations:
    ircs.prodigalgal.com/no-public-route: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ircs-admin-frontend
  template:
    metadata:
      labels:
        app: ircs-admin-frontend
        app.kubernetes.io/part-of: ircs
        environment: dev
      annotations:
        ircs.prodigalgal.com/no-public-route: "true"
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: ircs-admin-frontend
          image: harbor.mnnu.eu.org/ircs/ircs-frontend:029-task-runtime-20260613-1556
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ircs-frontend-gateway
  namespace: ircs-dev
  labels:
    app: ircs-frontend-gateway
    app.kubernetes.io/part-of: ircs
    environment: dev
  annotations:
    ircs.prodigalgal.com/no-public-route: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ircs-frontend-gateway
  template:
    metadata:
      labels:
        app: ircs-frontend-gateway
        app.kubernetes.io/part-of: ircs
        environment: dev
      annotations:
        ircs.prodigalgal.com/no-public-route: "true"
        ircs.prodigalgal.com/config-version: "api-gateway-20260702-1"
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: portal
              containerPort: 80
            - name: admin
              containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
          readinessProbe:
            httpGet:
              path: /gateway-health
              port: portal
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /gateway-health
              port: portal
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
      volumes:
        - name: nginx-config
          configMap:
            name: ircs-frontend-gateway-nginx
