apiVersion: apps/v1
kind: Deployment
metadata:
  name: ircs-scraper-service
  namespace: ircs-dev
  labels:
    app: ircs-scraper-service
    app.kubernetes.io/part-of: ircs
    environment: dev
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ircs-scraper-service
  template:
    metadata:
      labels:
        app: ircs-scraper-service
        app.kubernetes.io/part-of: ircs
        environment: dev
      annotations:
        ircs.prodigalgal.com/no-public-route: "true"
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: app
          image: harbor.mnnu.eu.org/ircs/ircs-scraper-service:029-source-retry-terminal-20260613-2046
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: ircs-dev-app-config
          env:
            - name: SPRING_APPLICATION_NAME
              value: ircs-scraper-service
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: ircs-dev-app-config
                  key: DB_URL
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ircs-dev-secrets
                  key: DB_PASSWORD
            - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              value: "2"
            - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
              value: "0"
            - name: SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT
              value: "30000"
            - name: SPRING_RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: ircs-dev-app-config
                  key: RABBITMQ_HOST
            - name: SPRING_RABBITMQ_USERNAME
              value: admin
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ircs-dev-secrets
                  key: RABBITMQ_PASSWORD
            - name: APP_SCRAPER_DIRECT_ITEMS_ENABLED
              value: "true"
            - name: APP_SCRAPER_TASK_QUEUE_LISTENER_ENABLED
              value: "true"
            - name: APP_SCRAPER_TASK_QUEUE_RETRY_MAX_RETRIES
              value: "3"
            - name: IRCS_MESSAGING_RABBIT_TOPOLOGY_RETRY_DELAY_MS
              value: "30000"
            - name: APP_SCRAPER_TREND_SYNC_MAX_PROVIDER_ITEMS
              value: "10"
            - name: APP_SCRAPER_TREND_DISCOVERY_MAX_DATA_SOURCES
              value: "1"
            - name: APP_SCRAPER_CREDENTIAL_SERVICE_BASE_URL
              value: http://ircs-credential-service.ircs-dev.svc.cluster.local:8080
            - name: APP_SCRAPER_CREDENTIAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ircs-dev-secrets
                  key: SERVICE_CREDENTIAL_TOKEN
            - name: APP_SCRAPER_TASK_SERVICE_BASE_URL
              value: http://ircs-task-service.ircs-dev.svc.cluster.local:8080
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ircs-scraper-service
  namespace: ircs-dev
  labels:
    app: ircs-scraper-service
    app.kubernetes.io/part-of: ircs
    environment: dev
spec:
  type: ClusterIP
  selector:
    app: ircs-scraper-service
  ports:
    - name: http
      port: 8080
      targetPort: http
