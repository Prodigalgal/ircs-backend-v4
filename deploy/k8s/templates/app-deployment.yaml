apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${SERVICE_NAME}
  namespace: ircs-system
  labels:
    app: ${SERVICE_NAME}
spec:
  replicas: ${REPLICAS}
  selector:
    matchLabels:
      app: ${SERVICE_NAME}
  template:
    metadata:
      labels:
        app: ${SERVICE_NAME}
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: app
          image: harbor.mnnu.eu.org/ircs/${SERVICE_NAME}:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_APPLICATION_NAME
              value: ${SERVICE_NAME}
            - name: SPRING_RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: ircs-backend-config
                  key: RABBITMQ_HOST
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ircs-backend-secrets
                  key: RABBITMQ_PASSWORD
            - name: APP_MAIL_HOST
              valueFrom:
                configMapKeyRef:
                  name: ircs-backend-config
                  key: MAIL_HOST
            - name: APP_MAIL_PORT
              valueFrom:
                configMapKeyRef:
                  name: ircs-backend-config
                  key: MAIL_PORT
            - name: APP_MAIL_FROM
              valueFrom:
                configMapKeyRef:
                  name: ircs-backend-config
                  key: MAIL_FROM
          envFrom:
            - configMapRef:
                name: ircs-backend-config
            - secretRef:
                name: ircs-backend-secrets
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            failureThreshold: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ${SERVICE_NAME}-svc
  namespace: ircs-system
  labels:
    app: ${SERVICE_NAME}
spec:
  type: ClusterIP
  selector:
    app: ${SERVICE_NAME}
  ports:
    - name: http
      port: 8080
      targetPort: http
