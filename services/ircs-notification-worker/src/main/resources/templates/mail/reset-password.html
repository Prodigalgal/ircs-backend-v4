<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh">
<head>
    <meta charset="UTF-8">
    <title>重置密码</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f4f4f5;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .header {
            background-color: #000000;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            color: #6366f1;
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
        }
        .content {
            padding: 40px;
            color: #333333;
            line-height: 1.6;
        }
        .btn-box {
            text-align: center;
            margin: 30px 0;
        }
        .btn {
            display: inline-block;
            background-color: #4f46e5;
            color: #ffffff !important;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 999px;
            font-weight: bold;
            font-size: 16px;
        }
        .footer {
            background-color: #f9fafb;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
            border-top: 1px solid #e5e7eb;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>画外 Huawai</h1>
    </div>
    <div class="content">
        <p>亲爱的 <strong th:text="${nickname}">用户</strong>：</p>
        <p>我们收到了重置您账号密码的请求。如果是您本人操作，请点击下方的按钮重置密码：</p>

        <div class="btn-box">
            <a th:href="${link}" class="btn">重置密码</a>
        </div>

        <p style="font-size: 12px; color: #666;">
            或者复制以下链接到浏览器打开：<br/>
            <span th:text="${link}">https://...</span>
        </p>

        <p>该链接在 15 分钟内有效。如果您没有发起此请求，请忽略此邮件。</p>
    </div>
    <div class="footer">
        <p>&copy; <span th:text="${#temporals.format(T(java.time.LocalDate).now(), 'yyyy')}">2026</span> ProdigalGal. All rights reserved.</p>
    </div>
</div>
</body>
</html>
