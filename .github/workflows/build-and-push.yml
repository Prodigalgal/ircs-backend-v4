name: build-and-push

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/build-and-push.yml"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - "gradlew"
      - "platform/**"
      - "services/**"
      - "shared/**"
      - "scripts/ci/**"
  workflow_dispatch:
    inputs:
      build_scope:
        description: "affected, all, or comma-separated service image names"
        required: false
        default: "affected"
      image_mode:
        description: "jvm or native"
        required: false
        default: "native"

permissions:
  contents: read

jobs:
  backend-images:
    runs-on: ubuntu-24.04
    env:
      REGISTRY: docker.io/speedproxy
      PUSH_REGISTRY: docker.io/speedproxy
      PROD_CONFIG_REPO_BRANCH: main
      PROD_K8S_DIRS: prod-config-repo/ircs-v4
      TARGET_PLATFORMS: linux/arm64,linux/amd64
      REGISTRY_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
      BUILD_SCOPE_INPUT: ${{ inputs.build_scope }}
      IMAGE_MODE_INPUT: ${{ inputs.image_mode || 'native' }}
      JIB_BASE_IMAGE: eclipse-temurin:25-jre-alpine
      JIB_ALLOW_INSECURE_REGISTRIES: "false"
      JIB_SEND_CREDENTIALS_OVER_HTTP: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure GitOps deploy key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.GITOPS_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Build and push images
        shell: bash
        run: |
          chmod +x gradlew
          chmod +x scripts/ci/jib-build-push-affected.sh
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            export IMAGE_TAG="${GITHUB_REF_NAME}"
          else
            export IMAGE_TAG="sha-$(git rev-parse --short=12 HEAD)"
          fi
          export BUILD_SCOPE="${BUILD_SCOPE_INPUT:-affected}"
          export IMAGE_MODE="${IMAGE_MODE_INPUT:-native}"
          scripts/ci/jib-build-push-affected.sh

      - name: Update production config image tags
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "Tag build detected; production manifests are not rewritten from release tags."
            exit 0
          fi
          if [[ ! -s ~/.ssh/id_ed25519 ]]; then
            echo "GITOPS_DEPLOY_KEY is required to update production manifests." >&2
            exit 2
          fi
          git clone \
            --depth 1 \
            --branch "${PROD_CONFIG_REPO_BRANCH}" \
            "git@github.com:Prodigalgal/ircs-prod-config.git" \
            prod-config-repo

          chmod +x scripts/ci/update-prod-image-tags.sh
          scripts/ci/update-prod-image-tags.sh build-image-manifest.txt

          cd prod-config-repo
          if git diff --quiet -- ircs-v4; then
            echo "No production manifest image changes."
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ircs-v4
          git commit -m "ci: update ircs v4 image tags"
          git push origin "HEAD:${PROD_CONFIG_REPO_BRANCH}"

      - name: Print image manifest
        shell: bash
        run: cat build-image-manifest.txt
